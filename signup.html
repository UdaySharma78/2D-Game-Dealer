<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - 2D Car Dealer</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-topbar">
    <a href="index.php" class="brand">2D <span>Car Dealer</span></a>
    <a href="index.php" class="back-link">← Back to Home</a>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-icon">🚗</div>
        <h2>Create Account</h2>
        <p class="auth-sub">Join us and start exploring premium toy cars</p>

        <div id="msg-box"></div>

        <form action="signup.php" method="POST" id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required>
            </div>

            <button type="submit" class="btn-auth">Create Account →</button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-alt">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
</div>

<script>
    // Show messages from URL
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');
    const type = params.get('type') || 'danger';
    if (msg) {
        document.getElementById('msg-box').innerHTML =
            `<div class="alert alert-${type}">${decodeURIComponent(msg)}</div>`;
    }

    // Client-side: check passwords match before submit
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        const pw  = document.getElementById('password').value;
        const cpw = document.getElementById('confirm').value;
        if (pw !== cpw) {
            e.preventDefault();
            document.getElementById('msg-box').innerHTML =
                '<div class="alert alert-danger">Passwords do not match!</div>';
        }
    });
</script>
</body>
</html>
