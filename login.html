<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 2D Car Dealer</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<!-- Top Bar -->
<div class="auth-topbar">
    <a href="index.php" class="brand">2D <span>Car Dealer</span></a>
    <a href="index.php" class="back-link">← Back to Home</a>
</div>

<!-- Login Card -->
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-icon">🏎</div>
        <h2>Welcome Back!</h2>
        <p class="auth-sub">Login to add cars to cart & win discount coupons</p>

        <!-- Error/Success messages from PHP -->
        <div id="msg-box"></div>

        <form action="login.php" method="POST" id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-auth">Login →</button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-alt">
            Don't have an account? <a href="signup.html">Sign Up Free</a>
        </div>
    </div>
</div>

<script>
    // Show error/success from URL param
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');
    const type = params.get('type') || 'danger';
    if (msg) {
        document.getElementById('msg-box').innerHTML =
            `<div class="alert alert-${type}">${decodeURIComponent(msg)}</div>`;
    }
</script>
</body>
</html>
